<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPO MATRIX TOUR 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0a;
  --surface:   #111111;
  --surface2:  #181818;
  --surface3:  #1f1f1f;
  --border:    #252525;
  --border2:   #333333;
  --green:     #3ddc78;
  --green-dim: #1f7040;
  --green-bg:  rgba(61,220,120,0.07);
  --amber:     #f0a500;
  --amber-bg:  rgba(240,165,0,0.08);
  --red:       #ff4d4d;
  --red-bg:    rgba(255,77,77,0.08);
  --text:      #f0f0f0;
  --text2:     #888888;
  --text3:     #444444;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Barlow', sans-serif;
  --cond:      'Barlow Condensed', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; }

/* HEADER */
.header { background: #000; border-bottom: 1px solid var(--border); padding: 0 32px; position: sticky; top: 0; z-index: 100; }
.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; min-height: 60px; }
.brand-title { font-family: var(--cond); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
.brand-sub { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 2.5px; margin-top: 2px; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.kpi { background: var(--surface); border: 1px solid var(--border); padding: 8px 16px; text-align: right; min-width: 120px; }
.kpi-label { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.kpi-val { font-family: var(--mono); font-size: 14px; font-weight: 500; margin-top: 3px; }
.kpi-val.g { color: var(--green); }
.kpi-val.p { color: var(--green); }
.kpi-val.r { color: var(--red); }
.header-controls { display: flex; align-items: center; gap: 8px; }
.vat-sel { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 11px; padding: 8px 10px; cursor: pointer; }
.vat-sel:focus { outline: none; border-color: var(--green); }
.btn-save { background: var(--green); color: #000; border: none; font-family: var(--cond); font-size: 13px; font-weight: 700; padding: 9px 22px; cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase; transition: background 0.15s; min-height: 44px; -webkit-tap-highlight-color: transparent; }
.btn-save:hover { background: #5ae890; }

/* TABS */
.tabs { display: flex; background: #000; border-bottom: 1px solid var(--border); padding: 0 32px; gap: 0; }
.tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-family: var(--cond); font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 14px 20px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

/* MAIN */
.main { padding: 24px 32px; }

/* FILTER */
.filter-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-right: 6px; }
.filter-btn { background: none; border: 1px solid var(--border2); color: var(--text3); font-family: var(--cond); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 5px 14px; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { color: var(--text2); border-color: var(--border2); }
.filter-btn.active { color: var(--green); border-color: var(--green); background: var(--green-bg); }

/* SHOW CARD */
.show-card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 4px; overflow: hidden; transition: border-color 0.2s; }
.show-card:hover { border-color: var(--border2); }
.show-card.open { border-color: var(--green-dim); border-left: 2px solid var(--green); }
.show-header { display: flex; align-items: center; padding: 14px 20px; cursor: pointer; user-select: none; gap: 16px; flex-wrap: wrap; }
.show-date { font-family: var(--mono); font-size: 11px; color: var(--text3); min-width: 105px; letter-spacing: 0.5px; }
.show-city { font-family: var(--cond); font-size: 17px; font-weight: 700; color: var(--text); flex: 1; letter-spacing: 0.5px; text-transform: uppercase; }
.badge { font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px; padding: 3px 8px; text-transform: uppercase; border: 1px solid; }
.badge-show { border-color: var(--border2); color: var(--text3); }
.badge-crew { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
.show-totals { display: flex; gap: 24px; margin-left: auto; }
.stot { text-align: right; }
.stot-label { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.stot-val { font-family: var(--mono); font-size: 13px; font-weight: 500; margin-top: 2px; }
.stot-val.n { color: var(--text3); }
.stot-val.b { color: var(--green); }
.chevron { color: var(--text3); font-size: 11px; transition: transform 0.2s; min-width: 14px; }
.show-card.open .chevron { transform: rotate(180deg); }

/* COST TABLE */
.cost-wrap { display: none; border-top: 1px solid var(--border); }
.show-card.open .cost-wrap { display: block; }
.cost-table { width: 100%; border-collapse: collapse; }
.cost-table th { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
.cost-table td { padding: 9px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.cost-table tr:last-child td { border-bottom: none; }
.cost-table tbody tr:hover td { background: rgba(61,220,120,0.03); }
.pos-label { font-size: 13px; font-weight: 500; color: var(--text2); min-width: 130px; }
.inp { background: var(--surface3); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 16px; padding: 7px 10px; transition: border-color 0.15s; -webkit-appearance: none; }
.inp:focus { outline: none; border-color: var(--green); }
.inp-num { width: 120px; font-size: 14px; }
.inp-date { width: 148px; font-size: 14px; }
.inp-text { width: 100%; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4) sepia(0.5) saturate(3) hue-rotate(90deg); opacity: 0.6; cursor: pointer; }
.mono-cell { font-family: var(--mono); font-size: 12px; text-align: right; min-width: 100px; white-space: nowrap; }
.mono-cell.n { color: var(--text3); }
.mono-cell.b { color: var(--text2); }
.status-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid; padding: 5px 11px; cursor: pointer; font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; min-width: 100px; min-height: 38px; justify-content: center; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.status-btn.paid { border-color: var(--green-dim); color: var(--green); background: var(--green-bg); }
.status-btn.unpaid { border-color: #5a2020; color: var(--red); background: var(--red-bg); }
.sdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.btn-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 5px; transition: color 0.15s; line-height: 1; }
.btn-del:hover { color: var(--red); }
.tot-row td { background: var(--surface2); border-top: 1px solid var(--border2) !important; font-family: var(--mono); font-size: 12px; font-weight: 500; padding: 11px 16px; }
.tot-label { color: var(--text3); letter-spacing: 1.5px; font-size: 9px; text-transform: uppercase; }
.tot-n { color: var(--text3); text-align: right; }
.tot-b { color: var(--green); text-align: right; font-weight: 600; }
.add-row-bar { display: flex; gap: 8px; align-items: center; padding: 10px 16px; background: var(--surface2); border-top: 1px solid var(--border); }
.inp-new-cat { background: var(--surface3); border: 1px dashed var(--border2); color: var(--text); font-family: var(--sans); font-size: 12px; padding: 7px 10px; flex: 1; max-width: 240px; }
.inp-new-cat:focus { outline: none; border-color: var(--green); border-style: solid; }
.btn-add { background: none; border: 1px solid var(--border2); color: var(--text2); font-family: var(--cond); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 7px 16px; cursor: pointer; transition: all 0.15s; }
.btn-add:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }

/* CREW */
.crew-block { background: var(--surface); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
.crew-block-hdr { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 16px 22px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.crew-block-left { border-left: 2px solid var(--amber); padding-left: 14px; }
.crew-block-title { font-family: var(--cond); font-size: 16px; font-weight: 700; color: var(--amber); letter-spacing: 1px; text-transform: uppercase; }
.crew-block-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 3px; }
.crew-block-controls { display: flex; gap: 12px; margin-left: auto; align-items: center; flex-wrap: wrap; }
.date-group { display: flex; flex-direction: column; gap: 3px; }
.date-group label { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.crew-status-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid; padding: 7px 14px; cursor: pointer; font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; white-space: nowrap; }
.crew-status-btn.paid { border-color: var(--green-dim); color: var(--green); background: var(--green-bg); }
.crew-status-btn.unpaid { border-color: #5a2020; color: var(--red); background: var(--red-bg); }
.crew-block-body { padding: 18px 22px; }
.note-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
.note-group label { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.crew-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; margin-bottom: 10px; }
.crew-item { background: var(--surface2); border: 1px solid var(--border); padding: 14px; transition: border-color 0.15s; }
.crew-item:hover { border-color: var(--border2); }
.crew-item-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.crew-num { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; }
.crew-pos-status { display: inline-flex; align-items: center; gap: 5px; background: none; border: 1px solid; padding: 4px 9px; cursor: pointer; font-family: var(--mono); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
.crew-pos-status.paid { border-color: var(--green-dim); color: var(--green); background: var(--green-bg); }
.crew-pos-status.unpaid { border-color: #5a2020; color: var(--red); background: var(--red-bg); }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.field label { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }
.field input, .field textarea { background: var(--surface3); border: 1px solid var(--border2); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 7px 10px; width: 100%; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus { outline: none; border-color: var(--green); }
.field textarea { resize: vertical; height: 46px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-del-crew { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.15s; }
.btn-del-crew:hover { color: var(--red); }
.btn-add-crew { width: 100%; background: none; border: 1px dashed var(--border2); color: var(--text3); font-family: var(--cond); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 10px; cursor: pointer; transition: all 0.15s; }
.btn-add-crew:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); border-style: solid; }

/* OVERVIEW */
.ov-kpis { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 24px; }
.ov-kpi { background: var(--surface); border: 1px solid var(--border); padding: 20px 22px; }
.ov-kpi-label { font-family: var(--mono); font-size: 8px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
.ov-kpi-val { font-family: var(--cond); font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
.section-title { font-family: var(--cond); font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.ov-table-wrap { overflow-x: auto; border: 1px solid var(--border); }
.ov-table { width: 100%; border-collapse: collapse; }
.ov-table th { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border2); background: var(--surface2); white-space: nowrap; }
.ov-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; }
.ov-table tr:last-child td { border-bottom: none; }
.ov-table tbody tr:hover td { background: rgba(61,220,120,0.03); }
.hidden { display: none !important; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); }
::-webkit-scrollbar-thumb:hover { background: #444; }
@media (max-width: 768px) {
  /* HEADER */
  .header { padding: 0 16px; }
  .header-inner { flex-direction: column; align-items: stretch; padding: 12px 0; gap: 10px; }
  .header-right { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .kpi { min-width: unset; text-align: left; padding: 8px 12px; }
  .header-controls { display: flex; gap: 8px; }
  .vat-sel { flex: 1; font-size: 13px; padding: 10px; }
  .btn-save { flex: 1; font-size: 14px; padding: 11px; }

  /* TABS */
  .tabs { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab-btn { padding: 12px 14px; font-size: 12px; white-space: nowrap; }

  /* MAIN */
  .main { padding: 12px 16px; }

  /* FILTER */
  .filter-btn { padding: 7px 14px; font-size: 13px; min-height: 36px; }

  /* SHOW CARD */
  .show-header { padding: 14px; gap: 6px; position: relative; }
  .show-date { font-size: 11px; min-width: unset; width: 100%; order: 1; }
  .show-city { font-size: 16px; width: 100%; flex: unset; order: 2; padding-right: 24px; }
  .badge { order: 3; }
  .show-totals { margin-left: 0; width: 100%; justify-content: space-between; order: 4; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .stot-val { font-size: 14px; }
  .chevron { position: absolute; right: 14px; top: 14px; }

  /* COST TABLE */
  .cost-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .cost-table th, .cost-table td { padding: 10px 10px; font-size: 12px; }
  .inp { font-size: 16px; }
  .inp-num { width: 100px; }
  .inp-date { width: 130px; }
  .status-btn { min-width: 80px; font-size: 8px; padding: 7px 8px; min-height: 36px; }

  /* ADD ROW BAR */
  .add-row-bar { flex-direction: column; align-items: stretch; gap: 8px; }
  .inp-new-cat { max-width: 100%; font-size: 16px; padding: 10px; }
  .btn-add { font-size: 14px; padding: 11px; text-align: center; min-height: 44px; }

  /* CREW */
  .crew-block-hdr { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px; }
  .crew-block-controls { flex-direction: column; gap: 10px; margin-left: 0; }
  .crew-block-controls .inp { width: 100%; font-size: 16px; }
  .date-group { flex-direction: row; align-items: center; gap: 10px; }
  .date-group label { min-width: 70px; }
  .crew-status-btn { width: 100%; justify-content: center; padding: 12px; font-size: 12px; min-height: 44px; }
  .crew-block-body { padding: 14px; }
  .crew-grid { grid-template-columns: 1fr; }
  .crew-item { padding: 14px; }
  .field input, .field textarea { font-size: 16px; padding: 10px; min-height: 44px; }
  .field textarea { height: 60px; }
  .btn-add-crew { font-size: 14px; padding: 13px; min-height: 44px; }
  .crew-pos-status { padding: 8px 12px; font-size: 9px; min-height: 36px; }
  .btn-del-crew { min-width: 32px; min-height: 32px; font-size: 16px; }

  /* OVERVIEW */
  .ov-kpis { grid-template-columns: 1fr 1fr; gap: 6px; }
  .ov-kpi { padding: 14px; }
  .ov-kpi-val { font-size: 20px; }
  .ov-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .ov-table th, .ov-table td { padding: 8px 10px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="brand-title">Capo Matrix Tour 2026</div>
      <div class="brand-sub">Cashflow Management</div>
    </div>
    <div class="header-right">
      <div class="kpi"><div class="kpi-label">Gesamt Netto</div><div class="kpi-val" style="color:var(--text2)" id="hdr-netto">€ 0,00</div></div>
      <div class="kpi"><div class="kpi-label">Gesamt Brutto</div><div class="kpi-val g" id="hdr-total">€ 0,00</div></div>
      <div class="kpi"><div class="kpi-label">Bezahlt</div><div class="kpi-val p" id="hdr-paid">€ 0,00</div></div>
      <div class="kpi"><div class="kpi-label">Noch offen</div><div class="kpi-val r" id="hdr-open">€ 0,00</div></div>
      <div class="header-controls">
        <select class="vat-sel" id="vat-rate" onchange="recalcAll()">
          <option value="0.19">MwSt 19%</option>
          <option value="0.07">MwSt 7%</option>
        </select>
        <button class="btn-save" onclick="saveData()">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('shows',this)">Shows</button>
  <button class="tab-btn" onclick="showTab('crew',this)">Crew Payments</button>
  <button class="tab-btn" onclick="showTab('overview',this)">Übersicht</button>
</div>

<div class="main" id="tab-shows">
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('unpaid',this)">Offen</button>
    <button class="filter-btn" onclick="setFilter('paid',this)">Bezahlt</button>
  </div>
  <div id="shows-container"></div>
</div>

<div class="main hidden" id="tab-crew">
  <div id="crew-container"></div>
</div>

<div class="main hidden" id="tab-overview">
  <div class="ov-kpis">
    <div class="ov-kpi"><div class="ov-kpi-label">Shows gesamt</div><div class="ov-kpi-val" id="ov-shows" style="color:var(--green)">0</div></div>
    <div class="ov-kpi"><div class="ov-kpi-label">Gesamt Netto</div><div class="ov-kpi-val" id="ov-netto" style="color:var(--text2)">€ 0</div></div>
    <div class="ov-kpi"><div class="ov-kpi-label">Gesamt Brutto</div><div class="ov-kpi-val" id="ov-total" style="color:var(--text)">€ 0</div></div>
    <div class="ov-kpi"><div class="ov-kpi-label">Bezahlt</div><div class="ov-kpi-val" id="ov-paid" style="color:#5dba7e">€ 0</div></div>
    <div class="ov-kpi"><div class="ov-kpi-label">Offen</div><div class="ov-kpi-val" id="ov-open" style="color:var(--red)">€ 0</div></div>
  </div>
  <div class="section-title">Kosten pro Show (Brutto)</div>
  <div class="ov-table-wrap"><div id="ov-table"></div></div>
</div>

<script>
const SHOWS=[
  {date:'31.03.2026',city:'Bielefeld'},
  {date:'01.04.2026',city:'Oberhausen'},
  {date:'03.04.2026',city:'Berlin'},
  {date:'06.04.2026',city:'Wien'},
  {date:'07.04.2026',city:'Zürich'},
  {date:'09.04.2026',city:'Stuttgart (1)'},
  {date:'10.04.2026',city:'Stuttgart (2)'},
  {date:'11.04.2026',city:'Hamburg (1)'},
  {date:'12.04.2026',city:'Hamburg (2)'},
  {date:'13.04.2026',city:'Hannover (1)'},
  {date:'14.04.2026',city:'Hannover (2)'},
  {date:'15.04.2026',city:'Köln'},
  {date:'16.04.2026',city:'München'},
  {date:'18.04.2026',city:'Offenbach (1)'},
  {date:'19.04.2026',city:'Offenbach (2)'},
];
const CREW_AFTER=new Set([3,7,10]);
const CREW_BLOCKS=[
  {title:'Crew Payment #1',sub:'Vorauszahlung — vor Tourstart (vor Bielefeld, 31.03.)'},
  {title:'Crew Payment #2',sub:'Nach Shows 1–4 — nach Wien (06.04.)'},
  {title:'Crew Payment #3',sub:'Nach Shows 5–8 — nach Hamburg (11.04.)'},
  {title:'Crew Payment #4',sub:'Vor den letzten 4 Shows — vor München (16.04.)'},
];
const DEFAULT_CATS=['Hallenmiete','Catering','Hands','Security','Sannis','Barriers','Towles','Additional Costs'];

let state={shows:{},crewBlocks:{}};

function getVAT(){return parseFloat(document.getElementById('vat-rate')?.value||0.19);}
function fmt(n){return '€\u00a0'+parseFloat(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function uid(){return Math.random().toString(36).slice(2,8);}

function initShow(i){
  if(!state.shows[i])state.shows[i]={cats:[]};
  if(!state.shows[i].cats.length)
    state.shows[i].cats=DEFAULT_CATS.map(l=>({id:uid(),label:l,netto:'',status:'unpaid',dueDate:'',paidDate:''}));
}
function initCrew(bi){
  if(!state.crewBlocks[bi])state.crewBlocks[bi]={status:'unpaid',dueDate:'',paidDate:'',note:'',positions:[]};
  while(state.crewBlocks[bi].positions.length<12)
    state.crewBlocks[bi].positions.push({id:uid(),name:'',role:'',desc:'',netto:'',brutto:'',dueDate:'',paidDate:'',status:'unpaid'});
}

function buildShows(){
  const c=document.getElementById('shows-container');c.innerHTML='';
  SHOWS.forEach((show,i)=>{
    initShow(i);
    const card=document.createElement('div');card.className='show-card';card.id=`sc-${i}`;
    card.innerHTML=`
      <div class="show-header" onclick="toggleCard(${i})">
        <div class="show-date">${show.date}</div>
        <div class="show-city">${show.city}</div>
        ${CREW_AFTER.has(i)?'<span class="badge badge-crew">Crew Pay danach</span>':'<span class="badge badge-show">Show</span>'}
        <div class="show-totals">
          <div class="stot"><div class="stot-label">Netto</div><div class="stot-val n" id="sn-${i}">€ 0,00</div></div>
          <div class="stot"><div class="stot-label">Brutto</div><div class="stot-val b" id="sb-${i}">€ 0,00</div></div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="cost-wrap">
        <table class="cost-table">
          <thead><tr>
            <th>Position</th><th>Netto Betrag</th><th>Netto</th>
            <th>Brutto (inkl. MwSt)</th><th>Status</th>
            <th>Fällig am</th><th>Bezahlt am</th><th></th>
          </tr></thead>
          <tbody id="tb-${i}"></tbody>
          <tfoot><tr class="tot-row"><td colspan="2" class="tot-label">Gesamt</td>
            <td class="tot-n" id="tn-${i}">€ 0,00</td>
            <td class="tot-b" id="tg-${i}">€ 0,00</td>
            <td colspan="4"></td></tr></tfoot>
        </table>
        <div class="add-row-bar">
          <input class="inp-new-cat" type="text" id="nci-${i}" placeholder="Neue Position...">
          <button class="btn-add" onclick="addCat(${i})">+ Hinzufügen</button>
        </div>
      </div>`;
    c.appendChild(card);renderRows(i);
  });
}

function renderRows(i){
  const tb=document.getElementById(`tb-${i}`);tb.innerHTML='';
  const vat=getVAT();
  state.shows[i].cats.forEach((cat,ci)=>{
    const b=parseFloat(cat.netto||0)*(1+vat);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="pos-label">${cat.label}</td>
      <td><input class="inp inp-num" type="number" min="0" step="0.01" placeholder="0,00" value="${cat.netto}" oninput="updCat(${i},${ci},'netto',this.value)"></td>
      <td class="mono-cell n" id="nv-${i}-${ci}">${cat.netto?fmt(cat.netto):'—'}</td>
      <td class="mono-cell b" id="bv-${i}-${ci}">${cat.netto?fmt(b):'—'}</td>
      <td><button class="status-btn ${cat.status}" id="stb-${i}-${ci}" onclick="togCat(${i},${ci})">
        <span class="sdot"></span><span id="stl-${i}-${ci}">${cat.status==='paid'?'Bezahlt':'Offen'}</span>
      </button></td>
      <td><input class="inp inp-date" type="date" value="${cat.dueDate}" onchange="updCat(${i},${ci},'dueDate',this.value)"></td>
      <td><input class="inp inp-date" type="date" value="${cat.paidDate}" onchange="updCat(${i},${ci},'paidDate',this.value)"></td>
      <td><button class="btn-del" onclick="delCat(${i},${ci})" title="Löschen">✕</button></td>`;
    tb.appendChild(tr);
  });
  recalcShow(i);
}

function updCat(si,ci,f,v){
  state.shows[si].cats[ci][f]=v;
  if(f==='netto'){
    const vat=getVAT(),val=parseFloat(v||0);
    document.getElementById(`nv-${si}-${ci}`).textContent=val?fmt(val):'—';
    document.getElementById(`bv-${si}-${ci}`).textContent=val?fmt(val*(1+vat)):'—';
  }
  recalcShow(si);recalcHeader();
}
function togCat(si,ci){
  const d=state.shows[si].cats[ci];d.status=d.status==='paid'?'unpaid':'paid';
  document.getElementById(`stb-${si}-${ci}`).className=`status-btn ${d.status}`;
  document.getElementById(`stl-${si}-${ci}`).textContent=d.status==='paid'?'Bezahlt':'Offen';
  recalcShow(si);recalcHeader();
}
function delCat(si,ci){state.shows[si].cats.splice(ci,1);renderRows(si);recalcHeader();}
function addCat(si){
  const inp=document.getElementById(`nci-${si}`),label=inp.value.trim();if(!label)return;
  state.shows[si].cats.push({id:uid(),label,netto:'',status:'unpaid',dueDate:'',paidDate:''});
  inp.value='';renderRows(si);
}
function recalcShow(i){
  const vat=getVAT();let n=0,b=0;
  state.shows[i].cats.forEach(c=>{const v=parseFloat(c.netto||0);n+=v;b+=v*(1+vat);});
  ['sn-'+i,'tn-'+i].forEach(id=>document.getElementById(id).textContent=fmt(n));
  ['sb-'+i,'tg-'+i].forEach(id=>document.getElementById(id).textContent=fmt(b));
}
function recalcAll(){SHOWS.forEach((_,i)=>{initShow(i);renderRows(i);});recalcHeader();}
function recalcHeader(){
  const vat=getVAT();let totN=0,totB=0,paid=0,open=0;
  // Shows
  SHOWS.forEach((_,i)=>{(state.shows[i]?.cats||[]).forEach(c=>{
    const n=parseFloat(c.netto||0);const b=n*(1+vat);
    totN+=n;totB+=b;
    if(c.status==='paid')paid+=b;else open+=b;
  });});
  // Crew positions (use brutto if set, else netto*(1+vat))
  CREW_BLOCKS.forEach((_,bi)=>{(state.crewBlocks[bi]?.positions||[]).forEach(pos=>{
    const n=parseFloat(pos.netto||0);
    const b=pos.brutto?parseFloat(pos.brutto):n*(1+vat);
    totN+=n;totB+=b;
    if(pos.status==='paid')paid+=b;else open+=b;
  });});
  document.getElementById('hdr-netto').textContent=fmt(totN);
  document.getElementById('hdr-total').textContent=fmt(totB);
  document.getElementById('hdr-paid').textContent=fmt(paid);
  document.getElementById('hdr-open').textContent=fmt(open);
}
function toggleCard(i){document.getElementById(`sc-${i}`).classList.toggle('open');}

function buildCrew(){
  const c=document.getElementById('crew-container');c.innerHTML='';
  CREW_BLOCKS.forEach((block,bi)=>{
    initCrew(bi);const bd=state.crewBlocks[bi];
    const el=document.createElement('div');el.className='crew-block';el.id=`cb-${bi}`;
    el.innerHTML=`
      <div class="crew-block-hdr">
        <div class="crew-block-left">
          <div class="crew-block-title">${block.title}</div>
          <div class="crew-block-sub">${block.sub}</div>
        </div>
        <div class="crew-block-controls">
          <div class="date-group"><label>Fällig am</label>
            <input class="inp inp-date" type="date" value="${bd.dueDate}" onchange="state.crewBlocks[${bi}].dueDate=this.value">
          </div>
          <div class="date-group"><label>Bezahlt am</label>
            <input class="inp inp-date" type="date" value="${bd.paidDate}" onchange="state.crewBlocks[${bi}].paidDate=this.value">
          </div>
          <button class="crew-status-btn ${bd.status}" id="cbs-${bi}" onclick="togCrewBlock(${bi})">
            <span class="sdot"></span><span id="cbsl-${bi}">${bd.status==='paid'?'Bezahlt':'Offen'}</span>
          </button>
        </div>
      </div>
      <div class="crew-block-body">
        <div class="note-group"><label>Notiz</label>
          <input class="inp inp-text" type="text" placeholder="Notiz zur Auszahlung..." value="${bd.note||''}" onchange="state.crewBlocks[${bi}].note=this.value">
        </div>
        <div class="crew-grid" id="cg-${bi}"></div>
        <button class="btn-add-crew" onclick="addCrewPos(${bi})">+ Crew Position hinzufügen</button>
      </div>`;
    c.appendChild(el);renderCrewPos(bi);
  });
}

function renderCrewPos(bi){
  const grid=document.getElementById(`cg-${bi}`);if(!grid)return;grid.innerHTML='';
  state.crewBlocks[bi].positions.forEach((pos,pi)=>{
    const item=document.createElement('div');item.className='crew-item';
    item.innerHTML=`
      <div class="crew-item-hdr">
        <div class="crew-num">Position ${String(pi+1).padStart(2,'0')}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="crew-pos-status ${pos.status}" id="cps-${bi}-${pi}" onclick="togCrewPos(${bi},${pi})">
            <span class="sdot"></span><span id="cpsl-${bi}-${pi}">${pos.status==='paid'?'Bezahlt':'Offen'}</span>
          </button>
          <button class="btn-del-crew" onclick="delCrewPos(${bi},${pi})" title="Entfernen">✕</button>
        </div>
      </div>
      <div class="field"><label>Name</label>
        <input type="text" placeholder="Name..." value="${pos.name}" onchange="state.crewBlocks[${bi}].positions[${pi}].name=this.value">
      </div>
      <div class="field"><label>Rolle / Funktion</label>
        <input type="text" placeholder="z.B. Tour Manager, FOH, Backline..." value="${pos.role}" onchange="state.crewBlocks[${bi}].positions[${pi}].role=this.value">
      </div>
      <div class="field"><label>Beschreibung</label>
        <textarea placeholder="Details..." onchange="state.crewBlocks[${bi}].positions[${pi}].desc=this.value">${pos.desc||''}</textarea>
      </div>
      <div class="grid-2">
        <div class="field"><label>Netto (€)</label>
          <input type="number" placeholder="0,00" value="${pos.netto}" onchange="state.crewBlocks[${bi}].positions[${pi}].netto=this.value">
        </div>
        <div class="field"><label>Brutto (€)</label>
          <input type="number" placeholder="0,00" value="${pos.brutto}" onchange="state.crewBlocks[${bi}].positions[${pi}].brutto=this.value">
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Fällig am</label>
          <input type="date" value="${pos.dueDate}" onchange="state.crewBlocks[${bi}].positions[${pi}].dueDate=this.value">
        </div>
        <div class="field"><label>Bezahlt am</label>
          <input type="date" value="${pos.paidDate}" onchange="state.crewBlocks[${bi}].positions[${pi}].paidDate=this.value">
        </div>
      </div>`;
    grid.appendChild(item);
  });
}

function togCrewBlock(bi){
  const bd=state.crewBlocks[bi];bd.status=bd.status==='paid'?'unpaid':'paid';
  document.getElementById(`cbs-${bi}`).className=`crew-status-btn ${bd.status}`;
  document.getElementById(`cbsl-${bi}`).textContent=bd.status==='paid'?'Bezahlt':'Offen';
  recalcHeader();
}
function togCrewPos(bi,pi){
  const pos=state.crewBlocks[bi].positions[pi];pos.status=pos.status==='paid'?'unpaid':'paid';
  document.getElementById(`cps-${bi}-${pi}`).className=`crew-pos-status ${pos.status}`;
  document.getElementById(`cpsl-${bi}-${pi}`).textContent=pos.status==='paid'?'Bezahlt':'Offen';
  recalcHeader();
}
function addCrewPos(bi){
  state.crewBlocks[bi].positions.push({id:uid(),name:'',role:'',desc:'',netto:'',brutto:'',dueDate:'',paidDate:'',status:'unpaid'});
  renderCrewPos(bi);
}
function delCrewPos(bi,pi){
  if(state.crewBlocks[bi].positions.length<=1)return;
  state.crewBlocks[bi].positions.splice(pi,1);renderCrewPos(bi);
}

function setFilter(f,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  SHOWS.forEach((_,i)=>{
    const card=document.getElementById(`sc-${i}`);if(f==='all'){card.style.display='';return;}
    const cats=state.shows[i]?.cats||[];
    card.style.display=((f==='paid'&&cats.some(c=>c.status==='paid'))||(f==='unpaid'&&cats.some(c=>c.status==='unpaid')))?'':'none';
  });
}

function updateOverview(){
  const vat=getVAT();let totN=0,totB=0,paid=0,open=0;
  // Shows
  SHOWS.forEach((_,i)=>{(state.shows[i]?.cats||[]).forEach(c=>{
    const n=parseFloat(c.netto||0);const b=n*(1+vat);
    totN+=n;totB+=b;if(c.status==='paid')paid+=b;else open+=b;
  });});
  // Crew
  CREW_BLOCKS.forEach((_,bi)=>{(state.crewBlocks[bi]?.positions||[]).forEach(pos=>{
    const n=parseFloat(pos.netto||0);
    const b=pos.brutto?parseFloat(pos.brutto):n*(1+vat);
    totN+=n;totB+=b;if(pos.status==='paid')paid+=b;else open+=b;
  });});
  document.getElementById('ov-shows').textContent=SHOWS.length;
  document.getElementById('ov-netto').textContent=fmt(totN);
  document.getElementById('ov-total').textContent=fmt(totB);
  document.getElementById('ov-paid').textContent=fmt(paid);
  document.getElementById('ov-open').textContent=fmt(open);

  // Shows table
  const allCats=new Set();SHOWS.forEach((_,i)=>(state.shows[i]?.cats||[]).forEach(c=>allCats.add(c.label)));
  const catList=[...allCats];

  // Crew summary per block
  const crewRows=CREW_BLOCKS.map((block,bi)=>{
    const positions=(state.crewBlocks[bi]?.positions||[]).filter(p=>p.netto||p.brutto);
    const rowN=positions.reduce((s,p)=>s+parseFloat(p.netto||0),0);
    const rowB=positions.reduce((s,p)=>s+(p.brutto?parseFloat(p.brutto):parseFloat(p.netto||0)*(1+vat)),0);
    const allP=positions.length&&positions.every(p=>p.status==='paid');
    const noP=!positions.length||positions.every(p=>p.status==='unpaid');
    const sc=allP?'var(--green)':noP?'var(--red)':'var(--amber)';
    const st=allP?'Komplett':noP?'Offen':'Teilweise';
    if(!rowB)return '';
    return `<tr style="background:rgba(240,165,0,0.04);">
      <td style="color:var(--text3);font-family:var(--mono);font-size:11px;">—</td>
      <td style="font-weight:600;color:var(--amber);">${block.title}</td>
      ${catList.map(()=>`<td style="font-family:var(--mono);color:var(--text3);">—</td>`).join('')}
      <td style="font-family:var(--mono);color:var(--text2);">${rowN?fmt(rowN):'—'}</td>
      <td style="font-family:var(--mono);color:var(--green);font-weight:500;">${rowB?fmt(rowB):'—'}</td>
      <td style="color:${sc};font-family:var(--mono);font-size:11px;">${st}</td>
    </tr>`;
  }).join('');

  document.getElementById('ov-table').innerHTML=`<table class="ov-table">
    <thead><tr><th>Datum</th><th>Stadt / Block</th>${catList.map(l=>`<th>${l}</th>`).join('')}<th>Total Netto</th><th>Total Brutto</th><th>Status</th></tr></thead>
    <tbody>${SHOWS.map((show,i)=>{
      const cats=state.shows[i]?.cats||[];const map={};cats.forEach(c=>map[c.label]=c);
      const rowN=cats.reduce((s,c)=>s+parseFloat(c.netto||0),0);
      const rowB=cats.reduce((s,c)=>s+parseFloat(c.netto||0)*(1+vat),0);
      const allP=cats.length&&cats.every(c=>c.status==='paid');const noP=cats.every(c=>c.status==='unpaid');
      const sc=allP?'var(--green)':noP?'var(--red)':'var(--amber)';
      const st=allP?'Komplett':noP?'Offen':'Teilweise';
      return `<tr>
        <td style="color:var(--text3);font-family:var(--mono);font-size:11px;">${show.date}</td>
        <td style="font-weight:600;">${show.city}</td>
        ${catList.map(l=>{const c=map[l];const v=c?parseFloat(c.netto||0)*(1+vat):0;
          return `<td style="font-family:var(--mono);color:${c?.status==='paid'?'var(--text3)':'var(--text2)'};">${v?fmt(v):'—'}</td>`;
        }).join('')}
        <td style="font-family:var(--mono);color:var(--text2);">${rowN?fmt(rowN):'—'}</td>
        <td style="font-family:var(--mono);color:var(--green);font-weight:500;">${rowB?fmt(rowB):'—'}</td>
        <td style="color:${sc};font-family:var(--mono);font-size:11px;">${st}</td>
      </tr>`;
    }).join('')}${crewRows}</tbody></table>`;
}

function showTab(t,btn){
  ['shows','crew','overview'].forEach(id=>document.getElementById(`tab-${id}`).classList.add('hidden'));
  document.getElementById(`tab-${t}`).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  if(t==='overview')updateOverview();
}

function saveData(){
  try{
    localStorage.setItem('capo_matrix_2026',JSON.stringify(state));
    const btn=document.querySelector('.btn-save');btn.textContent='✓ Gespeichert';
    setTimeout(()=>btn.textContent='Speichern',2000);
  }catch(e){alert('Fehler: '+e.message);}
}
function loadData(){
  try{const s=localStorage.getItem('capo_matrix_2026');if(s)state=JSON.parse(s);}catch(e){}
}

loadData();buildShows();buildCrew();recalcHeader();
</script>
</body>
</html>
